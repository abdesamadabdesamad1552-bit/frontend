<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 1080px;
      height: 1920px;
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      background:
        radial-gradient(circle at 50% 0%, rgba(212, 165, 90, 0.22) 0%, transparent 42%),
        radial-gradient(circle at 20% 80%, rgba(180, 83, 9, 0.12) 0%, transparent 35%),
        linear-gradient(165deg, #120c08 0%, #1a120b 45%, #0d0907 100%);
      color: #fff7ed;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 96px 72px;
      overflow: hidden;
      position: relative;
    }
    body::after {
      content: "";
      position: absolute;
      inset: 48px;
      border: 1px solid rgba(212, 165, 90, 0.18);
      border-radius: 32px;
      pointer-events: none;
    }
    .brand {
      position: absolute;
      top: 88px;
      font-size: 30px;
      letter-spacing: 4px;
      color: #d4a55a;
      font-weight: 700;
    }
    .hook {
      font-size: 40px;
      color: #f0c987;
      margin-bottom: 24px;
      font-weight: 600;
      text-align: center;
      min-height: 48px;
    }
    .main {
      font-size: 78px;
      line-height: 1.18;
      font-weight: 800;
      text-align: center;
      max-width: 920px;
      text-shadow: 0 8px 32px rgba(0,0,0,0.45);
    }
    .sub {
      margin-top: 32px;
      font-size: 42px;
      line-height: 1.4;
      text-align: center;
      color: rgba(255, 247, 237, 0.78);
      max-width: 900px;
      min-height: 58px;
    }
    .product {
      width: 560px;
      height: auto;
      margin: 44px 0 20px;
      filter: drop-shadow(0 28px 60px rgba(212, 165, 90, 0.35));
    }
    .badge {
      margin-top: 24px;
      background: rgba(212, 165, 90, 0.12);
      color: #f0c987;
      border: 1px solid rgba(212, 165, 90, 0.35);
      padding: 16px 34px;
      border-radius: 999px;
      font-size: 32px;
      font-weight: 700;
    }
    .badge.cta {
      background: linear-gradient(135deg, #b45309, #d97706);
      color: white;
      border-color: transparent;
      box-shadow: 0 12px 40px rgba(180, 83, 9, 0.35);
    }
    .ingredients {
      margin-top: 36px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      max-width: 860px;
    }
    .pill {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(212, 165, 90, 0.22);
      border-radius: 20px;
      padding: 20px 26px;
      font-size: 36px;
      font-weight: 700;
      text-align: center;
      color: #fff7ed;
    }
    .timecode {
      position: absolute;
      bottom: 88px;
      left: 72px;
      font-size: 26px;
      color: rgba(212, 165, 90, 0.55);
      letter-spacing: 1px;
    }
    
  </style>
</head>
<body>
  <div class="brand">نقاء · Naqa Beauty</div>
  <div class="hook">تركيزات حقيقية</div>
  <div class="main">10% · 5% · 2%</div>
  <div class="sub">Vit C · Niacinamide · Alpha Arbutin</div>
  
  
  
      <div class="ingredients">
        <div class="pill">Ethyl Ascorbic Acid 10%</div>
        <div class="pill">Niacinamide 5%</div>
        <div class="pill">Alpha Arbutin 2%</div>
        <div class="pill">Hyaluronic Acid</div>
      </div>
  
  <div class="timecode">0:11–0:18</div>
</body>
</html>
