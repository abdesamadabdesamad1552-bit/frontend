<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 1080px; height: 1920px;
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      background:
        radial-gradient(circle at 50% 0%, rgba(212,165,90,0.22) 0%, transparent 42%),
        radial-gradient(circle at 20% 80%, rgba(180,83,9,0.12) 0%, transparent 35%),
        linear-gradient(165deg, #120c08 0%, #1a120b 45%, #0d0907 100%);
      color: #fff7ed; overflow: hidden; position: relative;
    }
    body::after {
      content: ""; position: absolute; inset: 48px;
      border: 1px solid rgba(212,165,90,0.18); border-radius: 32px; pointer-events: none;
    }
    .brand { position: absolute; top: 88px; left: 0; right: 0; text-align: center;
      font-size: 30px; letter-spacing: 4px; color: #d4a55a; font-weight: 700; z-index: 10; }
    .stage { display: flex; width: 100%; height: 100%; padding: 96px 72px; position: relative; }
    .content { display: flex; flex-direction: column; z-index: 2; }
    .hook { font-size: 36px; color: #f0c987; margin-bottom: 16px; font-weight: 600; }
    .main { line-height: 1.18; font-weight: 800; text-shadow: 0 8px 32px rgba(0,0,0,0.45); }
    .sub { margin-top: 20px; font-size: 38px; line-height: 1.4; color: rgba(255,247,237,0.78); }
    .avatar-wrap { filter: drop-shadow(0 20px 50px rgba(212,165,90,0.25)); }
    .avatar-svg { display: block; }
    .product { width: 480px; height: auto; filter: drop-shadow(0 28px 60px rgba(212,165,90,0.35)); }
    .badge { margin-top: 20px; background: rgba(212,165,90,0.12); color: #f0c987;
      border: 1px solid rgba(212,165,90,0.35); padding: 14px 30px; border-radius: 999px;
      font-size: 30px; font-weight: 700; display: inline-block; }
    .badge.cta { background: linear-gradient(135deg, #b45309, #d97706); color: white; border: none;
      box-shadow: 0 12px 40px rgba(180,83,9,0.35); }
    .ingredients { margin-top: 24px; display: flex; flex-direction: column; gap: 12px; width: 100%; }
    .pill { background: rgba(255,255,255,0.06); border: 1px solid rgba(212,165,90,0.22);
      border-radius: 20px; padding: 18px 22px; font-size: 34px; font-weight: 700; text-align: center; }
    .ba-wrap { display: flex; width: 100%; max-width: 860px; height: 280px; margin: 16px 0 8px;
      border-radius: 24px; overflow: hidden; border: 1px solid rgba(212,165,90,0.35); }
    .ba-panel { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; }
    .ba-panel.before { background: rgba(0,0,0,0.25); }
    .ba-panel.after { background: rgba(212,165,90,0.08); }
    .ba-label { position: absolute; top: 12px; font-size: 24px; font-weight: 700; color: #f0c987;
      background: rgba(0,0,0,0.45); padding: 4px 14px; border-radius: 999px; }
    .ba-skin { width: 140px; height: 140px; border-radius: 50%; margin-top: 20px; }
    .ba-skin.uneven { background:
      radial-gradient(circle at 35% 40%, rgba(90,55,30,0.55) 0%, transparent 28%),
      linear-gradient(145deg, #c4956a, #8b6344); filter: saturate(0.85); }
    .ba-skin.even { background: linear-gradient(145deg, #d4a574, #b8875e);
      box-shadow: 0 0 40px rgba(212,165,90,0.35); }
    .ba-divider { width: 3px; background: linear-gradient(180deg, transparent, #d4a55a, transparent); }
    .ba-disclaimer { font-size: 20px; color: rgba(255,247,237,0.45); }
    
      .stage { flex-direction: column; padding-top: 100px; gap: 8px; }
      .avatar-wrap { margin-bottom: 4px; }
      .content { text-align: center; align-items: center; }
      .main { font-size: 58px; }
      .product.mid { width: 320px; margin: 12px 0; }
  </style>
</head>
