name: Build Frontend Image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          no-cache: true
          tags: |
            ghcr.io/abdesamadabdesamad1552-bit/naqa-frontend:latest
            ghcr.io/abdesamadabdesamad1552-bit/naqa-frontend:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.naqabeauty.store
            NEXT_PUBLIC_BUILD_SHA=${{ github.sha }}

      - name: Make GHCR package public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE: naqa-frontend
        run: |
          OWNER="${{ github.repository_owner }}"
          OWNER_TYPE="$(gh api "/users/${OWNER}" --jq .type)"
          if [ "$OWNER_TYPE" = "Organization" ]; then
            ENDPOINT="/orgs/${OWNER}/packages/container/${PACKAGE}"
          else
            ENDPOINT="/user/packages/container/${PACKAGE}"
          fi

          VISIBILITY="$(gh api "${ENDPOINT}" --jq .visibility 2>/dev/null || echo unknown)"
          echo "Current visibility: ${VISIBILITY}"

          if [ "$VISIBILITY" != "public" ]; then
            gh api --method PATCH "${ENDPOINT}/visibility" -f visibility=public \
              && echo "Package is now public" \
              || echo "::warning::Could not set visibility via API. Make it public manually on GitHub."
          else
            echo "Package is already public"
          fi
