name: Build Frontend Image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          no-cache: true
          tags: |
            ghcr.io/abdesamadabdesamad1552-bit/naqa-frontend:latest
            ghcr.io/abdesamadabdesamad1552-bit/naqa-frontend:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.naqabeauty.store
            NEXT_PUBLIC_BUILD_SHA=${{ github.sha }}
